<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mid-Market SC Flashcards — Nextiva NCC</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --navy: #0A2540;
    --navy-deep: #061A2F;
    --blue: #1E4B8F;
    --blue-light: #3B6FC4;
    --orange: #FE6F1A;
    --orange-soft: #FF8A3D;
    --ink: #0F1B2D;
    --muted: #5B6B80;
    --bg: #F4F6FA;
    --card: #FFFFFF;
    --border: #E3E8F0;
    --shadow: 0 6px 24px rgba(10, 37, 64, 0.10);
    --shadow-lg: 0 18px 40px rgba(10, 37, 64, 0.18);
  }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }
  .app {
    max-width: 720px;
    margin: 0 auto;
    padding: 16px 16px 120px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header { padding: 8px 4px 16px; }
  h1 {
    font-size: 22px;
    font-weight: 800;
    color: var(--navy);
    letter-spacing: -0.01em;
  }
  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }
  .controls {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin: 12px 0 16px;
  }
  .category-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 6px;
    scrollbar-width: none;
  }
  .category-row::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 999px;
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--ink);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .chip.active {
    background: var(--navy);
    color: #fff;
    border-color: var(--navy);
  }
  .chip .count {
    opacity: 0.65;
    margin-left: 4px;
    font-weight: 500;
  }
  .progress-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--muted);
    font-weight: 600;
  }
  .progress-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--orange));
    border-radius: 999px;
    transition: width 0.3s ease;
  }
  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 0;
    perspective: 1600px;
    min-height: 420px;
  }
  .card {
    width: 100%;
    max-width: 640px;
    aspect-ratio: 3 / 4;
    max-height: 560px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.2, 0.8, 0.2, 1);
    cursor: pointer;
  }
  @media (max-height: 750px) {
    .card { aspect-ratio: 4 / 5; }
  }
  .card.flipped { transform: rotateY(180deg); }
  .face {
    position: absolute;
    inset: 0;
    border-radius: 20px;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
  }
  .face.front {
    background: linear-gradient(155deg, var(--navy) 0%, var(--navy-deep) 100%);
    color: #fff;
  }
  .face.back {
    background: var(--card);
    color: var(--ink);
    transform: rotateY(180deg);
    overflow-y: auto;
  }
  .face-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    flex-shrink: 0;
  }
  .face.back .face-header {
    border-bottom-color: var(--border);
  }
  .category-tag {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--orange-soft);
  }
  .face.back .category-tag {
    color: var(--orange);
  }
  .segment-tag {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.85);
    margin-left: 6px;
    letter-spacing: 0.05em;
  }
  .face.back .segment-tag {
    background: var(--border);
    color: var(--muted);
  }
  .card-number {
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    font-weight: 600;
  }
  .face.back .card-number { color: var(--muted); }
  .prompt {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.3;
    letter-spacing: -0.01em;
    flex: 1;
    display: flex;
    align-items: center;
  }
  .prompt-inner { width: 100%; }
  .flip-hint {
    text-align: center;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    flex-shrink: 0;
    margin-top: 12px;
  }
  .answer {
    font-size: 15px;
    line-height: 1.55;
    color: var(--ink);
    flex: 1;
  }
  .answer p { margin-bottom: 10px; }
  .answer p:last-child { margin-bottom: 0; }
  .answer strong { color: var(--navy); font-weight: 700; }
  .answer ul, .answer ol {
    margin: 8px 0 10px 18px;
    padding-left: 4px;
  }
  .answer li { margin-bottom: 6px; }
  .answer .callout {
    background: #FFF4EC;
    border-left: 3px solid var(--orange);
    padding: 10px 12px;
    margin: 10px 0;
    border-radius: 6px;
    font-size: 14px;
  }
  .answer .callout strong { color: var(--orange); }
  .nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, var(--bg) 70%, rgba(244,246,250,0));
    padding: 14px 16px 18px;
    z-index: 20;
  }
  .nav-inner {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    border: none;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    letter-spacing: 0.01em;
  }
  .btn:active { transform: scale(0.97); }
  .btn-prev, .btn-next {
    background: var(--card);
    color: var(--navy);
    border: 1.5px solid var(--border);
  }
  .btn-flip {
    background: var(--orange);
    color: #fff;
    flex: 1.4;
    box-shadow: 0 6px 16px rgba(254, 111, 26, 0.35);
  }
  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .shuffle-btn {
    padding: 8px 14px;
    border-radius: 999px;
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--navy);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }
  .shuffle-btn:active { transform: scale(0.96); }
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }
  @media (max-width: 480px) {
    .prompt { font-size: 18px; }
    .answer { font-size: 14px; }
    h1 { font-size: 19px; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="top-row">
      <h1>Mid-Market SC Flashcards</h1>
      <button class="shuffle-btn" id="shuffleBtn">🔀 Shuffle</button>
    </div>
    <div class="subtitle">Nextiva NCC · LMM + UMM deal execution</div>
  </header>

  <div class="controls">
    <div class="category-row" id="categoryRow"></div>
    <div class="progress-bar">
      <span id="progressText">1 / 1</span>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>
  </div>

  <div class="stage">
    <div class="card" id="card">
      <div class="face front">
        <div class="face-header">
          <div>
            <span class="category-tag" id="frontCat">Category</span>
            <span class="segment-tag" id="frontSeg" style="display:none">LMM</span>
          </div>
          <span class="card-number" id="frontNum">1</span>
        </div>
        <div class="prompt"><div class="prompt-inner" id="promptText">Loading…</div></div>
        <div class="flip-hint">Tap to reveal</div>
      </div>
      <div class="face back">
        <div class="face-header">
          <div>
            <span class="category-tag" id="backCat">Category</span>
            <span class="segment-tag" id="backSeg" style="display:none">LMM</span>
          </div>
          <span class="card-number" id="backNum">1</span>
        </div>
        <div class="answer" id="answerText">Loading…</div>
      </div>
    </div>
  </div>

  <div class="nav">
    <div class="nav-inner">
      <button class="btn btn-prev" id="prevBtn">← Prev</button>
      <button class="btn btn-flip" id="flipBtn">Flip</button>
      <button class="btn btn-next" id="nextBtn">Next →</button>
    </div>
  </div>
</div>

<script>
// Segment tags: "BOTH" (shown on all cards), "LMM" (lower mid-market), "UMM" (upper mid-market)
const CARDS = [
  // ===== DISCOVERY (top priority — the #1 execution gap) =====
  {
    category: "Discovery",
    segment: "BOTH",
    prompt: "Why is discovery the biggest execution gap on mid-market deals?",
    answer: `
      <p><strong>Because mid-market SCs get pulled into demos before they understand the deal.</strong></p>
      <p>The pattern:</p>
      <ul>
        <li>AE books a demo fast because velocity matters in mid-market</li>
        <li>SC joins without talking to the buyer first</li>
        <li>Demo becomes a generic product tour</li>
        <li>Buyer feels unheard; deal goes quiet or loses on fit</li>
      </ul>
      <div class="callout"><strong>The fix:</strong> 20-minute discovery on every deal before demo. Not 2 hours like Strategic — just 20 focused minutes. That's the bar.</div>
    `
  },
  {
    category: "Discovery",
    segment: "BOTH",
    prompt: "The 20-minute mid-market discovery: what questions do you ask?",
    answer: `
      <p><strong>Keep it tight — mid-market buyers don't have 45 minutes for discovery.</strong></p>
      <ol>
        <li><strong>"What's the platform you're on today, and what made you start looking?"</strong> — Gets you the incumbent + the trigger event</li>
        <li><strong>"What's the one thing that's most broken right now?"</strong> — The pain that justifies the project</li>
        <li><strong>"Who else is involved in this decision, and what do they care about?"</strong> — Stakeholder map in one question</li>
        <li><strong>"What's your timeline, and what's driving it?"</strong> — Separates real deals from window shopping</li>
        <li><strong>"If we did a demo next week, what would be the most useful thing to show you?"</strong> — Tells you exactly how to tune the demo</li>
      </ol>
      <div class="callout">Five questions. Twenty minutes. Better than 80% of mid-market demos get before they're built.</div>
    `
  },
  {
    category: "Discovery",
    segment: "BOTH",
    prompt: "What do you do when the AE won't let you do discovery first?",
    answer: `
      <p><strong>Three options, in order:</strong></p>
      <ol>
        <li><strong>The ask:</strong> "Let me get 20 minutes with their tech lead before the demo — it'll double the close rate."</li>
        <li><strong>The side-channel:</strong> Email the prospect's main contact directly: "Quick 15 min before our meeting to make sure the demo is specifically useful to you?" Most buyers say yes.</li>
        <li><strong>The in-meeting pivot:</strong> Start the demo call with "Before I dive in, help me tune this — tell me about your current setup and the one thing you most want to fix." Turn the first 10 minutes into discovery.</li>
      </ol>
      <div class="callout"><strong>Never skip discovery.</strong> A generic demo wastes everyone's time and lowers your close rate. Push.</div>
    `
  },
  {
    category: "Discovery",
    segment: "BOTH",
    prompt: "What 3 things should you know before ANY mid-market demo?",
    answer: `
      <ol>
        <li><strong>Their current platform.</strong> RingCentral? Mitel? 8x8? Nextiva Pro (upgrade)? On-prem PBX? This changes the entire pitch.</li>
        <li><strong>Their trigger event.</strong> Contract renewal? Outage? Acquisition? New VP? "Just looking" is not a trigger.</li>
        <li><strong>Their seat count range and channel mix.</strong> 50 agents voice-only is a different demo than 300 agents with chat and SMS.</li>
      </ol>
      <div class="callout">If you don't have these 3, you're not ready to demo — you're ready to do discovery. Do that first.</div>
    `
  },
  {
    category: "Discovery",
    segment: "UMM",
    prompt: "UMM-specific: what extra discovery do you need above 500 seats?",
    answer: `
      <p>Upper mid-market buyers ask more questions because the deal is bigger and the buying committee is wider. Add these to your discovery:</p>
      <ul>
        <li><strong>Integration landscape:</strong> CRM, ticketing, WFM, QM, WEM — what do they have, what do they need wired up?</li>
        <li><strong>Reporting and BI:</strong> Where does contact center data need to land? BigQuery, Snowflake, Tableau, Looker?</li>
        <li><strong>Multi-site / remote workforce:</strong> How many sites? Agents at home? Global presence?</li>
        <li><strong>Compliance posture:</strong> HIPAA, PCI-DSS, SOC 2, GDPR — which apply?</li>
        <li><strong>Who owns the contract?</strong> IT? Operations? Finance? CX? This changes the entire evaluation path.</li>
      </ul>
      <div class="callout">Above 500 seats, you're selling to a buying committee of 5–8 people. Discovery has to cover all their angles.</div>
    `
  },
  {
    category: "Discovery",
    segment: "LMM",
    prompt: "LMM-specific: how do you move fast without skipping discovery?",
    answer: `
      <p>Lower mid-market moves quickly — buyers want a demo within days, not weeks. Adapt:</p>
      <ul>
        <li><strong>15-minute pre-call the day before the demo.</strong> Not "discovery" — call it "prep so the demo is useful to you."</li>
        <li><strong>Chat-based discovery.</strong> Slack, email, or SMS a few questions and get answers async before the call.</li>
        <li><strong>First 10 minutes of the demo is discovery in disguise.</strong> "Before I show you anything, walk me through what your day looks like now."</li>
        <li><strong>Pre-built vertical decks.</strong> If you already have a healthcare demo tenant and the buyer is healthcare, you're 70% prepped — discovery just tunes the rest.</li>
      </ul>
      <div class="callout">LMM velocity isn't "skip discovery." It's "compress discovery without losing it."</div>
    `
  },

  // ===== COMPETITIVE =====
  {
    category: "Competitive",
    segment: "BOTH",
    prompt: "How do you position against RingCentral in mid-market?",
    answer: `
      <p><strong>RingCentral is the most common incumbent. Play their strengths honestly, then press the wedge.</strong></p>
      <p><strong>Fair acknowledgment:</strong> "RingCentral has a solid UCaaS product and a big install base. For UC-only, they're capable."</p>
      <p><strong>The wedge:</strong></p>
      <ul>
        <li><strong>Their CCaaS is bolted on (RingCX).</strong> It's newer, less mature, and doesn't share a native data layer with their UC. Our CCaaS is native.</li>
        <li><strong>They've been through pricing changes and reorg pressure.</strong> Ask the buyer: "How predictable has your pricing been?"</li>
        <li><strong>They're a voice-first platform with digital layered on. We're built omnichannel from day one.</strong></li>
        <li><strong>Their AI story is fragmented across products. Our NCC stack is integrated.</strong></li>
      </ul>
      <div class="callout">Don't trash RC. Show the buyer what to stress-test in their evaluation.</div>
    `
  },
  {
    category: "Competitive",
    segment: "BOTH",
    prompt: "How do you position against 8x8 in mid-market?",
    answer: `
      <p><strong>8x8 is Nextiva's closest structural competitor — UCaaS + CCaaS on one platform.</strong></p>
      <p><strong>Fair acknowledgment:</strong> "8x8 has been unified UC + CC longer than most. They're a credible option."</p>
      <p><strong>The wedge:</strong></p>
      <ul>
        <li><strong>Execution and modernization.</strong> 8x8's core platform has legacy architecture. Our Thrio-based NCC is more modern, more AI-forward.</li>
        <li><strong>Financial health.</strong> 8x8 has had slower growth and restructuring. Ask the buyer: "Who do you want as a multi-year partner?"</li>
        <li><strong>AI depth.</strong> We have Dialogflow CX + Thrio + BigQuery. 8x8's AI story is less integrated and less proven at scale.</li>
        <li><strong>Deployment speed and support.</strong> Nextiva's support ratings and NPS consistently exceed 8x8's.</li>
      </ul>
    `
  },
  {
    category: "Competitive",
    segment: "BOTH",
    prompt: "How do you position against Dialpad in mid-market?",
    answer: `
      <p><strong>Dialpad leads with AI branding. That's the angle to handle head-on.</strong></p>
      <p><strong>Fair acknowledgment:</strong> "Dialpad has done good marketing around AI in UC. Real-time transcription is solid."</p>
      <p><strong>The wedge:</strong></p>
      <ul>
        <li><strong>Dialpad is UC-first with CC layered on.</strong> If the buyer has >100 contact center agents, they outgrow Dialpad's CC fast.</li>
        <li><strong>"AI" in Dialpad often means transcription + summaries. Ours means full agentic AI with Dialogflow CX, workflow automation, and custom agent building.</strong></li>
        <li><strong>Dialpad's routing and WEM are thin.</strong> Any serious contact center ops leader will find gaps in skills routing, QM, and forecasting.</li>
        <li><strong>Our reporting layer with BigQuery gives real analytics. Dialpad's dashboards are more surface-level.</strong></li>
      </ul>
    `
  },
  {
    category: "Competitive",
    segment: "BOTH",
    prompt: "How do you position against Five9 in mid-market?",
    answer: `
      <p><strong>Five9 is a pure-play CCaaS — strongest direct CC competitor for us.</strong></p>
      <p><strong>Fair acknowledgment:</strong> "Five9 is a mature CC platform. For CC-only, they're capable."</p>
      <p><strong>The wedge:</strong></p>
      <ul>
        <li><strong>UC + CC unification.</strong> Five9 has no UCaaS. If the buyer has a separate phone system, they're managing two vendors, two bills, two support orgs. We consolidate.</li>
        <li><strong>Deployment speed.</strong> Five9 engagements often run 4–6 months. We deploy mid-market in 60–90 days.</li>
        <li><strong>Total cost.</strong> Five9 per-seat plus services plus integration tax usually runs 20–30% higher TCO than Nextiva unified.</li>
        <li><strong>Innovation velocity.</strong> Nextiva ships new AI features faster than Five9's release train.</li>
      </ul>
      <div class="callout">Against Five9, the single most effective question is: "Do you currently have a separate phone system vendor? What's that costing you to maintain?"</div>
    `
  },
  {
    category: "Competitive",
    segment: "BOTH",
    prompt: "How do you position against Talkdesk in mid-market?",
    answer: `
      <p><strong>Talkdesk leans heavily on AI narrative and has strong product marketing.</strong></p>
      <p><strong>Fair acknowledgment:</strong> "Talkdesk has invested heavily in AI and has a clean UI. Ascend AI is a solid story."</p>
      <p><strong>The wedge:</strong></p>
      <ul>
        <li><strong>Financial stability questions.</strong> Talkdesk has had layoffs and private investor pressure. Ask: "Who do you want as a long-term partner?"</li>
        <li><strong>CC-only, no UC.</strong> Same wedge as Five9 — consolidation opportunity.</li>
        <li><strong>Vertical depth.</strong> Talkdesk markets verticals heavily but real customer references are thinner than they appear. Test it.</li>
        <li><strong>TCO with all the AI add-ons stacked up is closer to enterprise pricing.</strong></li>
      </ul>
    `
  },
  {
    category: "Competitive",
    segment: "UMM",
    prompt: "How do you position against Genesys Cloud CX (upper mid-market)?",
    answer: `
      <p><strong>Genesys is moving downmarket from enterprise. At UMM, they're competing hard.</strong></p>
      <p><strong>Fair acknowledgment:</strong> "Genesys is a Gartner Leader and has deep functionality. For complex operations, they're a serious option."</p>
      <p><strong>The wedge:</strong></p>
      <ul>
        <li><strong>Complexity tax.</strong> Genesys Cloud has enterprise DNA. Mid-market customers routinely struggle with configuration complexity and implementation timelines.</li>
        <li><strong>Cost.</strong> Genesys pricing is 30–50% higher than Nextiva for equivalent capability in mid-market.</li>
        <li><strong>UC + CC unification.</strong> Genesys has no UCaaS.</li>
        <li><strong>Implementation services-heavy model.</strong> Genesys deals require long PS engagements. Nextiva is more self-serve and faster to value.</li>
      </ul>
      <div class="callout">The framing: "Genesys is built for 5,000-seat global banks. You're 400 seats. Do you need the complexity, or do you need outcomes?"</div>
    `
  },
  {
    category: "Competitive",
    segment: "BOTH",
    prompt: "How do you handle GoTo Contact Center / Zoom Contact Center?",
    answer: `
      <p><strong>These are SMB-leaning platforms pushing into mid-market. Easy wedge in most cases.</strong></p>
      <p><strong>Fair acknowledgment:</strong> "GoTo and Zoom Contact Center are newer entries. For very small teams, they can work."</p>
      <p><strong>The wedge:</strong></p>
      <ul>
        <li><strong>Shallow CCaaS depth.</strong> Limited skills routing, thin WEM, basic reporting. The gaps show up fast above 50 agents.</li>
        <li><strong>Zoom Contact Center is video-call-centric.</strong> Voice and digital channels are less mature.</li>
        <li><strong>GoTo's contact center is cobbled together from the Jive acquisition. Legacy architecture.</strong></li>
        <li><strong>Neither has an agentic AI story close to ours.</strong></li>
      </ul>
      <div class="callout">When a buyer is evaluating GoTo or Zoom CC seriously, they usually haven't done contact center before. Lead with discovery — not features.</div>
    `
  },
  {
    category: "Competitive",
    segment: "UMM",
    prompt: "How do you position against Sprinklr in UMM?",
    answer: `
      <p><strong>Sprinklr is the newest serious CCaaS player — strong digital and social angle, weak on voice maturity.</strong></p>
      <p><strong>Fair acknowledgment:</strong> "Sprinklr is unique — they came into CCaaS from unified CXM and have deep social/digital roots. For digital-first operations, interesting choice."</p>
      <p><strong>The wedge:</strong></p>
      <ul>
        <li><strong>Voice is newer for Sprinklr.</strong> Their voice/telephony only went GA in late 2025. We've been doing voice at scale for years.</li>
        <li><strong>Implementation complexity.</strong> Gartner Peer Insights reviews consistently call Sprinklr complex to implement and "a learning curve for new users."</li>
        <li><strong>No UCaaS.</strong> Same wedge as Five9/Talkdesk.</li>
        <li><strong>Pricing.</strong> Sprinklr markets to enterprises. Their pricing and PS model can feel heavy for mid-market.</li>
        <li><strong>They're trying to do everything — social listening + marketing + service + voice.</strong> If the buyer only needs contact center, that's a lot of platform they're paying for.</li>
      </ul>
      <div class="callout">When Sprinklr is in a deal, it usually means the buyer has a big digital/social footprint. Lead with our omnichannel depth, not against Sprinklr's strengths.</div>
    `
  },
  {
    category: "Competitive",
    segment: "BOTH",
    prompt: "What's the universal competitive question you ask in EVERY mid-market deal?",
    answer: `
      <p><strong>"Do you have a separate phone system vendor from your contact center today?"</strong></p>
      <p><strong>Why this question is a weapon:</strong></p>

let currentCategory = 'All';
let filteredCards = [...CARDS];
let currentIndex = 0;
let isFlipped = false;

const card = document.getElementById('card');
const promptText = document.getElementById('promptText');
const answerText = document.getElementById('answerText');
const frontCat = document.getElementById('frontCat');
const backCat = document.getElementById('backCat');
const frontSeg = document.getElementById('frontSeg');
const backSeg = document.getElementById('backSeg');
const frontNum = document.getElementById('frontNum');
const backNum = document.getElementById('backNum');
const progressText = document.getElementById('progressText');
const progressFill = document.getElementById('progressFill');
const categoryRow = document.getElementById('categoryRow');

function getCategories() {
  const cats = ['All', ...new Set(CARDS.map(c => c.category))];
  return cats.map(cat => ({
    name: cat,
    count: cat === 'All' ? CARDS.length : CARDS.filter(c => c.category === cat).length
  }));
}

function renderCategories() {
  const cats = getCategories();
  categoryRow.innerHTML = cats.map(c =>
    `<button class="chip ${c.name === currentCategory ? 'active' : ''}" data-cat="${c.name}">
      ${c.name}<span class="count">${c.count}</span>
    </button>`
  ).join('');
  categoryRow.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => selectCategory(btn.dataset.cat));
  });
}

function selectCategory(cat) {
  currentCategory = cat;
  filteredCards = cat === 'All' ? [...CARDS] : CARDS.filter(c => c.category === cat);
  currentIndex = 0;
  isFlipped = false;
  card.classList.remove('flipped');
  renderCategories();
  renderCard();
}

function renderCard() {
  if (filteredCards.length === 0) return;
  const c = filteredCards[currentIndex];
  promptText.textContent = c.prompt;
  answerText.innerHTML = c.answer;
  frontCat.textContent = c.category;
  backCat.textContent = c.category;
  frontNum.textContent = `${currentIndex + 1} / ${filteredCards.length}`;
  backNum.textContent = `${currentIndex + 1} / ${filteredCards.length}`;

  // Segment tags
  if (c.segment && c.segment !== 'BOTH') {
    frontSeg.textContent = c.segment;
    backSeg.textContent = c.segment;
    frontSeg.style.display = 'inline-block';
    backSeg.style.display = 'inline-block';
  } else {
    frontSeg.style.display = 'none';
    backSeg.style.display = 'none';
  }

  progressText.textContent = `${currentIndex + 1} / ${filteredCards.length}`;
  progressFill.style.width = `${((currentIndex + 1) / filteredCards.length) * 100}%`;
  document.getElementById('prevBtn').disabled = currentIndex === 0;
  document.getElementById('nextBtn').disabled = currentIndex === filteredCards.length - 1;
  const backFace = document.querySelector('.face.back');
  if (backFace) backFace.scrollTop = 0;
}

function flip() {
  isFlipped = !isFlipped;
  card.classList.toggle('flipped');
}

function next() {
  if (currentIndex < filteredCards.length - 1) {
    currentIndex++;
    isFlipped = false;
    card.classList.remove('flipped');
    setTimeout(renderCard, 100);
  }
}

function prev() {
  if (currentIndex > 0) {
    currentIndex--;
    isFlipped = false;
    card.classList.remove('flipped');
    setTimeout(renderCard, 100);
  }
}

function shuffle() {
  for (let i = filteredCards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filteredCards[i], filteredCards[j]] = [filteredCards[j], filteredCards[i]];
  }
  currentIndex = 0;
  isFlipped = false;
  card.classList.remove('flipped');
  renderCard();
}

card.addEventListener('click', flip);
document.getElementById('flipBtn').addEventListener('click', (e) => { e.stopPropagation(); flip(); });
document.getElementById('nextBtn').addEventListener('click', (e) => { e.stopPropagation(); next(); });
document.getElementById('prevBtn').addEventListener('click', (e) => { e.stopPropagation(); prev(); });
document.getElementById('shuffleBtn').addEventListener('click', shuffle);

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') next();
  else if (e.key === 'ArrowLeft') prev();
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
});

let touchStartX = 0;
let touchStartY = 0;
card.addEventListener('touchstart', (e) => {
  touchStartX = e.changedTouches[0].screenX;
  touchStartY = e.changedTouches[0].screenY;
}, { passive: true });
card.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].screenX - touchStartX;
  const dy = e.changedTouches[0].screenY - touchStartY;
  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)) {
    if (dx < 0) next();
    else prev();
  }
}, { passive: true });

renderCategories();
renderCard();
</script>
</body>
</html>
