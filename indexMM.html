<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strategic SC Flashcards — Nextiva NCC</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --navy: #0A2540;
    --navy-deep: #061A2F;
    --blue: #1E4B8F;
    --blue-light: #3B6FC4;
    --orange: #FE6F1A;
    --orange-soft: #FF8A3D;
    --ink: #0F1B2D;
    --muted: #5B6B80;
    --bg: #F4F6FA;
    --card: #FFFFFF;
    --border: #E3E8F0;
    --shadow: 0 6px 24px rgba(10, 37, 64, 0.10);
    --shadow-lg: 0 18px 40px rgba(10, 37, 64, 0.18);
  }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }
  .app {
    max-width: 720px;
    margin: 0 auto;
    padding: 16px 16px 120px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 8px 4px 16px;
  }
  h1 {
    font-size: 22px;
    font-weight: 800;
    color: var(--navy);
    letter-spacing: -0.01em;
  }
  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }
  .controls {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin: 12px 0 16px;
  }
  .category-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 6px;
    scrollbar-width: none;
  }
  .category-row::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 999px;
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--ink);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .chip.active {
    background: var(--navy);
    color: #fff;
    border-color: var(--navy);
  }
  .chip .count {
    opacity: 0.65;
    margin-left: 4px;
    font-weight: 500;
  }
  .progress-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--muted);
    font-weight: 600;
  }
  .progress-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--orange));
    border-radius: 999px;
    transition: width 0.3s ease;
  }
  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 0;
    perspective: 1600px;
    min-height: 420px;
  }
  .card {
    width: 100%;
    max-width: 640px;
    aspect-ratio: 3 / 4;
    max-height: 560px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.2, 0.8, 0.2, 1);
    cursor: pointer;
  }
  @media (max-height: 750px) {
    .card { aspect-ratio: 4 / 5; }
  }
  .card.flipped { transform: rotateY(180deg); }
  .face {
    position: absolute;
    inset: 0;
    border-radius: 20px;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
  }
  .face.front {
    background: linear-gradient(155deg, var(--navy) 0%, var(--navy-deep) 100%);
    color: #fff;
  }
  .face.back {
    background: var(--card);
    color: var(--ink);
    transform: rotateY(180deg);
    overflow-y: auto;
  }
  .face-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    flex-shrink: 0;
  }
  .face.back .face-header {
    border-bottom-color: var(--border);
  }
  .category-tag {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--orange-soft);
  }
  .face.back .category-tag {
    color: var(--orange);
  }
  .card-number {
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    font-weight: 600;
  }
  .face.back .card-number { color: var(--muted); }
  .prompt {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.3;
    letter-spacing: -0.01em;
    flex: 1;
    display: flex;
    align-items: center;
  }
  .prompt-inner { width: 100%; }
  .flip-hint {
    text-align: center;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    flex-shrink: 0;
    margin-top: 12px;
  }
  .answer {
    font-size: 15px;
    line-height: 1.55;
    color: var(--ink);
    flex: 1;
  }
  .answer p { margin-bottom: 10px; }
  .answer p:last-child { margin-bottom: 0; }
  .answer strong { color: var(--navy); font-weight: 700; }
  .answer ul, .answer ol {
    margin: 8px 0 10px 18px;
    padding-left: 4px;
  }
  .answer li { margin-bottom: 6px; }
  .answer .callout {
    background: #FFF4EC;
    border-left: 3px solid var(--orange);
    padding: 10px 12px;
    margin: 10px 0;
    border-radius: 6px;
    font-size: 14px;
  }
  .answer .callout strong { color: var(--orange); }
  .nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, var(--bg) 70%, rgba(244,246,250,0));
    padding: 14px 16px 18px;
    z-index: 20;
  }
  .nav-inner {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    border: none;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    letter-spacing: 0.01em;
  }
  .btn:active { transform: scale(0.97); }
  .btn-prev, .btn-next {
    background: var(--card);
    color: var(--navy);
    border: 1.5px solid var(--border);
  }
  .btn-flip {
    background: var(--orange);
    color: #fff;
    flex: 1.4;
    box-shadow: 0 6px 16px rgba(254, 111, 26, 0.35);
  }
  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .shuffle-btn {
    padding: 8px 14px;
    border-radius: 999px;
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--navy);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }
  .shuffle-btn:active { transform: scale(0.96); }
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }
  .reset-link {
    font-size: 12px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    font-weight: 600;
    font-family: inherit;
  }
  .reset-link:hover { color: var(--navy); }

  @media (max-width: 480px) {
    .prompt { font-size: 18px; }
    .answer { font-size: 14px; }
    h1 { font-size: 19px; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="top-row">
      <h1>Strategic SC Flashcards</h1>
      <button class="shuffle-btn" id="shuffleBtn">🔀 Shuffle</button>
    </div>
    <div class="subtitle">Nextiva NCC · Enterprise deal preparation</div>
  </header>

  <div class="controls">
    <div class="category-row" id="categoryRow"></div>
    <div class="progress-bar">
      <span id="progressText">1 / 1</span>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>
  </div>

  <div class="stage">
    <div class="card" id="card">
      <div class="face front">
        <div class="face-header">
          <span class="category-tag" id="frontCat">Category</span>
          <span class="card-number" id="frontNum">1</span>
        </div>
        <div class="prompt"><div class="prompt-inner" id="promptText">Loading…</div></div>
        <div class="flip-hint">Tap to reveal</div>
      </div>
      <div class="face back">
        <div class="face-header">
          <span class="category-tag" id="backCat">Category</span>
          <span class="card-number" id="backNum">1</span>
        </div>
        <div class="answer" id="answerText">Loading…</div>
      </div>
    </div>
  </div>

  <div class="nav">
    <div class="nav-inner">
      <button class="btn btn-prev" id="prevBtn">← Prev</button>
      <button class="btn btn-flip" id="flipBtn">Flip</button>
      <button class="btn btn-next" id="nextBtn">Next →</button>
    </div>
  </div>
</div>

<script>
const CARDS = [
  // ===== CATEGORY: DISCOVERY =====
  {
    category: "Discovery",
    prompt: "What are the 4 questions you ask on every first discovery call?",
    answer: `
      <ol>
        <li><strong>The bad-call question:</strong> "Walk me through a call that went badly last week — what happened, why, and what would have to be true to prevent it?"</li>
        <li><strong>The current-state truth question:</strong> "When you describe your current platform to your boss, what do you say works and what doesn't?"</li>
        <li><strong>The future-state question:</strong> "If we're sitting here in 18 months and this was the best decision your team made, what will be true?"</li>
        <li><strong>The deal-killer question:</strong> "What's the one thing that would make you kill this deal in month 6 of implementation?"</li>
      </ol>
      <div class="callout"><strong>Why it works:</strong> You're not asking what they want. You're asking what they fear and what they believe. That's where real discovery lives.</div>
    `
  },
  {
    category: "Discovery",
    prompt: "Name the 6 stakeholders you must identify before your first demo.",
    answer: `
      <ul>
        <li><strong>Economic buyer</strong> — signs the check</li>
        <li><strong>Technical buyer</strong> — architecture veto power</li>
        <li><strong>User buyer</strong> — contact center operations leader</li>
        <li><strong>Coach</strong> — internal advocate who wants you to win</li>
        <li><strong>Skeptic</strong> — and why they're skeptical</li>
        <li><strong>Incumbent relationship</strong> — there's always one</li>
      </ul>
      <div class="callout">If you can't name all 6, you don't know the deal well enough to demo.</div>
    `
  },
  {
    category: "Discovery",
    prompt: "What do you do when an AE wants to jump straight to a demo on call 1?",
    answer: `
      <p><strong>Push back — professionally.</strong></p>
      <p>Ask for 30–45 minutes of your own discovery first, even if AE discovery has been done. You need to hear it in the buyer's voice, not filtered through the AE.</p>
      <p><strong>The script:</strong> "I want to make sure our demo is specifically about their workflow, not a generic walkthrough. Can I get 30 minutes with their technical lead before we demo? It'll make the demo 10x more credible."</p>
      <p>A good AE will respect this. A great AE will thank you later.</p>
    `
  },

  // ===== CATEGORY: COMPETITIVE =====
  {
    category: "Competitive",
    prompt: "How do you answer 'How are you different from NICE CXone?'",
    answer: `
      <p><strong>Don't zinger. Consult.</strong></p>
      <p>"NICE is a strong platform — they're a Gartner Leader for a reason. Where I'd push back is on three things for your specific situation:</p>
      <ol>
        <li><strong>Deployment speed:</strong> NICE engagements often run 12–18 months. We deploy mid-market and upper-mid enterprise in 90–120 days.</li>
        <li><strong>UCaaS + CCaaS as one platform:</strong> NICE has no UCaaS. If you're consolidating vendors, that's a structural advantage for us.</li>
        <li><strong>TCO transparency:</strong> NICE pricing is complex and heavy on services. Ours is more predictable.</li>
      </ol>
      <p>Where NICE wins: Mpower Agents for back-office fulfillment, enterprise WEM depth, analyst positioning."</p>
      <div class="callout"><strong>Why this works:</strong> Being fair to the competitor makes you trustworthy. Buyers remember that.</div>
    `
  },
  {
    category: "Competitive",
    prompt: "How do you answer 'Why not just go with Agentforce Contact Center since we're on Salesforce?'",
    answer: `
      <p><strong>Acknowledge the logic, then reframe.</strong></p>
      <p>"Fair question — if you're all-in on Salesforce, it's a reasonable path. Three things to stress-test before committing:</p>
      <ol>
        <li><strong>Multi-CRM reality:</strong> Most enterprises have Salesforce AND ServiceNow AND Workday. Agentforce only wins if you're standardizing everything on Salesforce. We're CRM-agnostic.</li>
        <li><strong>Pricing predictability:</strong> Flex Credits are consumption-based. Budgeting agentic AI across thousands of seats gets unpredictable fast.</li>
        <li><strong>Telephony maturity:</strong> Agentforce Contact Center went GA in early 2026. We've been running contact center telephony at scale for years. There's a reason the early adopters are Savant and Compass, not Fortune 50s."</li>
      </ol>
    `
  },
  {
    category: "Competitive",
    prompt: "How do you answer 'Genesys is a Leader and you're not even on the MQ.'?",
    answer: `
      <p><strong>Don't get defensive. Reframe the question.</strong></p>
      <p>"You're right that Genesys is a Leader. Gartner has specific inclusion criteria, and we're investing to get there. Here's what I'd ask you to consider:</p>
      <ul>
        <li>The MQ reflects vendor scale, not fit for your deal. Genesys's strengths are giant, highly customized deployments — that's what they're optimized for.</li>
        <li>Gartner notes 80% of its clients are late adopters. Leader-quadrant vendors have pricing and deployment models built for late adopters.</li>
        <li>The question isn't 'who's on the MQ' — it's 'who will deliver the outcomes you need in the time you have.'</li>
      </ul>
      <p>Then pivot: <em>'What would we have to prove for the MQ to become a non-issue for you?'</em>"</p>
      <div class="callout">You're not winning the MQ argument. You're moving it off the table.</div>
    `
  },
  {
    category: "Competitive",
    prompt: "A buyer says 'NICE told us X about you.' What's your move?",
    answer: `
      <p><strong>Don't flinch. Don't trash NICE. Engage.</strong></p>
      <p>"That's a fair thing for them to say. Here's where I'd push back, and here's how I'd suggest you test it yourself."</p>
      <p>Then give them:</p>
      <ul>
        <li>The honest part — where NICE's critique has merit</li>
        <li>The pushback — where it's misleading or outdated</li>
        <li>A test — "Here's how you can validate this independently"</li>
      </ul>
      <div class="callout"><strong>Payoff:</strong> The buyer starts telling you what NICE is saying. Now you're inside their evaluation.</div>
    `
  },

  // ===== CATEGORY: DEMO CRAFT =====
  {
    category: "Demo Craft",
    prompt: "What are the 5 ways to customize a demo tenant to a specific prospect?",
    answer: `
      <ul>
        <li><strong>Brand colors + logo</strong> on agent desktop and IVR</li>
        <li><strong>Their queue names</strong> from discovery (e.g., "Platinum Support," not "Queue 1")</li>
        <li><strong>Call volumes that match theirs</strong> — don't show 50 calls/day to a 10,000-call/day operation</li>
        <li><strong>Named IVR routing</strong> using their actual products or services</li>
        <li><strong>Their competitors' pain</strong> — if they're on Avaya, show the Avaya-to-Nextiva workflow migration story</li>
      </ul>
      <div class="callout"><strong>Time cost:</strong> ~2 hours. <strong>Credibility return:</strong> 10x.</div>
    `
  },
  {
    category: "Demo Craft",
    prompt: "What 3 things should you stop doing in demos?",
    answer: `
      <ol>
        <li><strong>Stop demoing features.</strong> Demo their workflow with their brand.</li>
        <li><strong>Stop answering unasked questions.</strong> If they didn't ask about WEM, don't spend 10 minutes on it.</li>
        <li><strong>Stop running every call the same way.</strong> CIOs want architecture. VPs of CX want outcomes. Procurement wants terms. Adjust the demo to the audience.</li>
      </ol>
    `
  },
  {
    category: "Demo Craft",
    prompt: "What's the 'Day 1 architecture session' and why does it work?",
    answer: `
      <p>A 2-hour whiteboarding workshop offered early in the cycle. <strong>No demo. No pitch.</strong> A Nextiva solutions architect maps the prospect's current state and co-designs a proposed future state.</p>
      <p><strong>Why it's the highest-converting move you can make:</strong></p>
      <ul>
        <li>Most vendors won't do it — it costs internal architect time</li>
        <li>The buyer co-creates the solution with you → they own it emotionally</li>
        <li>You surface real requirements before the RFP is written</li>
        <li>You identify competitive red flags early</li>
      </ul>
      <div class="callout">Customers who go through this session close at dramatically higher rates.</div>
    `
  },
  {
    category: "Demo Craft",
    prompt: "What's the 'theater mode' demo setup for enterprise?",
    answer: `
      <p>Pre-scripted live agent activity running in background so that <strong>real-time dashboards light up during the demo.</strong></p>
      <ul>
        <li>Simulated calls arriving in queues</li>
        <li>Agent states changing (Available → On Call → Wrap-up)</li>
        <li>Supervisor dashboards showing live metrics moving</li>
        <li>Survey responses flowing in</li>
        <li>BigQuery dashboards refreshing</li>
      </ul>
      <div class="callout"><strong>Why it matters:</strong> Enterprise buyers have seen 100 static screens. A dashboard that's actually moving during a demo is visceral proof the platform is alive.</div>
    `
  },

  // ===== CATEGORY: OBJECTIONS =====
  {
    category: "Objections",
    prompt: "Objection: 'You don't have the enterprise references we need.'",
    answer: `
      <p><strong>Don't fake it. Redirect it.</strong></p>
      <p>"You're right that we're earlier in our enterprise journey than Genesys or NICE. Here's the honest version:</p>
      <ul>
        <li>We have [X] named customers above 1,000 seats. I can connect you with [specific named reference].</li>
        <li>In your specific industry, here's what we've done: [specific use case]</li>
        <li>I'd rather you talk to those references and come away with a real answer than me oversell.</li>
      </ul>
      <p>Then flip it: <em>'What would a reference need to say for this concern to be resolved?'</em> That tells you exactly what outcome they need to hear."</p>
    `
  },
  {
    category: "Objections",
    prompt: "Objection: 'Can you really scale to 10,000+ agents?'",
    answer: `
      <p><strong>Never answer this with marketing words. Answer with architecture and proof.</strong></p>
      <ul>
        <li><strong>Architecture:</strong> Show the multi-region active-active diagram. Show the capacity model. Show the load test results.</li>
        <li><strong>Proof:</strong> Current largest deployment, SLA history, DR/failover test results.</li>
        <li><strong>Honesty:</strong> "If your actual steady-state is 15,000 concurrent agents with global failover, we should architect that together and validate it with our engineering team before we commit."</li>
      </ul>
      <div class="callout">Overselling scale is the #1 way to blow up an enterprise deal in year 2. Be specific.</div>
    `
  },
  {
    category: "Objections",
    prompt: "Objection: 'Your AI is just Dialogflow — we can get that anywhere.'",
    answer: `
      <p>"You're right that Dialogflow CX is available broadly. The differentiator isn't the model — it's the stack:</p>
      <ol>
        <li><strong>Dialogflow is the reasoning layer.</strong> Thrio is the fulfillment layer — workflows, CRM writes, transfer logic, guardrails.</li>
        <li><strong>BigQuery is the intelligence layer.</strong> Every conversation is structured data feeding continuous improvement.</li>
        <li><strong>We're model-flexible.</strong> Gemini today, Claude or GPT tomorrow — we don't lock you into one vendor's AI.</li>
        <li><strong>We handle the integration tax.</strong> 'Getting Dialogflow anywhere' isn't the problem. Getting it to actually fulfill end-to-end customer workflows with your CRM and telephony is the problem. That's what we ship."</li>
      </ol>
    `
  },
  {
    category: "Objections",
    prompt: "Objection: 'We're worried about migration risk from [Avaya/Cisco/Genesys Engage].'",
    answer: `
      <p><strong>This is legitimate — take it seriously.</strong></p>
      <ul>
        <li><strong>Acknowledge:</strong> "That's the single biggest reason these migrations stall. You're right to be cautious."</li>
        <li><strong>Coexistence:</strong> Position a phased migration where Nextiva runs alongside the legacy system for 6–12 months. No big-bang cutover.</li>
        <li><strong>Named program:</strong> Offer a defined migration methodology — discovery, workflow mapping, parallel run, controlled cutover.</li>
        <li><strong>Reference:</strong> "Here's a customer who did the [Avaya/Cisco] migration. 30 minutes, no pitch."</li>
      </ul>
      <div class="callout">Enterprise buyers will pay a premium for migration certainty. Lead with process, not product.</div>
    `
  },
  {
    category: "Objections",
    prompt: "Objection: 'You're not FedRAMP / HITRUST / [certification].'",
    answer: `
      <p><strong>Don't bluff. Don't give up. Redirect.</strong></p>
      <p>If you don't have it:</p>
      <ul>
        <li>"You're right — we're not [certification] today. Here's where we are on the roadmap and what the timeline looks like."</li>
        <li>"For your specific use case, here's how we address the underlying requirement — [SOC 2 + HIPAA BAA + data residency controls, etc.]."</li>
        <li>"Is [certification] a hard gate for procurement, or a preference? Let me get our compliance lead on a call with yours to scope what the gap actually is."</li>
      </ul>
      <div class="callout">Compliance conversations are usually more flexible than they first sound. Get to the actual requirement.</div>
    `
  },

  // ===== CATEGORY: PROOF OF CONCEPT =====
  {
    category: "PoC",
    prompt: "Name the 3 common failure modes of an enterprise PoC.",
    answer: `
      <ol>
        <li><strong>Scope creep.</strong> Prospect adds requirements mid-stream. You say yes. You miss the deadline.</li>
        <li><strong>Unclear success criteria.</strong> You deliver something. They say it wasn't what they wanted.</li>
        <li><strong>Handoff failure.</strong> It works in your demo environment. Breaks in theirs due to networking, SSO, CRM sandbox limits, etc.</li>
      </ol>
      <div class="callout">Fix all three with one document: a signed Success Criteria doc before day 1.</div>
    `
  },
  {
    category: "PoC",
    prompt: "What goes in the Success Criteria document before any PoC starts?",
    answer: `
      <ul>
        <li><strong>3–5 measurable outcomes</strong> — not "demonstrate AI"; specific metrics</li>
        <li><strong>Timeline</strong> with checkpoint dates</li>
        <li><strong>Named owners</strong> on both sides</li>
        <li><strong>Scope boundaries</strong> — explicitly what's IN and what's OUT</li>
        <li><strong>Weekly checkpoint cadence</strong></li>
        <li><strong>Signed off by the technical buyer</strong> before kickoff</li>
      </ul>
      <div class="callout">Sounds bureaucratic. It's not — it's why Genesys and NICE SCs win PoCs.</div>
    `
  },
  {
    category: "PoC",
    prompt: "What's the difference between a scoped PoC and a 'pilot trap'?",
    answer: `
      <p><strong>Scoped PoC:</strong> Time-boxed (2–4 weeks), fixed scope, measurable outcomes, leads to signed contract.</p>
      <p><strong>Pilot trap:</strong> "Just let us try it for 90 days." No scope. No success criteria. Free consulting while the buyer evaluates three other vendors.</p>
      <p><strong>How to avoid the pilot trap:</strong></p>

// ====== APP STATE ======
let currentCategory = 'All';
let filteredCards = [...CARDS];
let currentIndex = 0;
let isFlipped = false;

const card = document.getElementById('card');
const promptText = document.getElementById('promptText');
const answerText = document.getElementById('answerText');
const frontCat = document.getElementById('frontCat');
const backCat = document.getElementById('backCat');
const frontNum = document.getElementById('frontNum');
const backNum = document.getElementById('backNum');
const progressText = document.getElementById('progressText');
const progressFill = document.getElementById('progressFill');
const categoryRow = document.getElementById('categoryRow');

// Get unique categories
function getCategories() {
  const cats = ['All', ...new Set(CARDS.map(c => c.category))];
  return cats.map(cat => ({
    name: cat,
    count: cat === 'All' ? CARDS.length : CARDS.filter(c => c.category === cat).length
  }));
}

function renderCategories() {
  const cats = getCategories();
  categoryRow.innerHTML = cats.map(c =>
    `<button class="chip ${c.name === currentCategory ? 'active' : ''}" data-cat="${c.name}">
      ${c.name}<span class="count">${c.count}</span>
    </button>`
  ).join('');
  categoryRow.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => selectCategory(btn.dataset.cat));
  });
}

function selectCategory(cat) {
  currentCategory = cat;
  filteredCards = cat === 'All' ? [...CARDS] : CARDS.filter(c => c.category === cat);
  currentIndex = 0;
  isFlipped = false;
  card.classList.remove('flipped');
  renderCategories();
  renderCard();
}

function renderCard() {
  if (filteredCards.length === 0) return;
  const c = filteredCards[currentIndex];
  promptText.textContent = c.prompt;
  answerText.innerHTML = c.answer;
  frontCat.textContent = c.category;
  backCat.textContent = c.category;
  frontNum.textContent = `${currentIndex + 1} / ${filteredCards.length}`;
  backNum.textContent = `${currentIndex + 1} / ${filteredCards.length}`;
  progressText.textContent = `${currentIndex + 1} / ${filteredCards.length}`;
  progressFill.style.width = `${((currentIndex + 1) / filteredCards.length) * 100}%`;
  document.getElementById('prevBtn').disabled = currentIndex === 0;
  document.getElementById('nextBtn').disabled = currentIndex === filteredCards.length - 1;
  // scroll back face to top when card changes
  const backFace = document.querySelector('.face.back');
  if (backFace) backFace.scrollTop = 0;
}

function flip() {
  isFlipped = !isFlipped;
  card.classList.toggle('flipped');
}

function next() {
  if (currentIndex < filteredCards.length - 1) {
    currentIndex++;
    isFlipped = false;
    card.classList.remove('flipped');
    setTimeout(renderCard, 100);
  }
}

function prev() {
  if (currentIndex > 0) {
    currentIndex--;
    isFlipped = false;
    card.classList.remove('flipped');
    setTimeout(renderCard, 100);
  }
}

function shuffle() {
  for (let i = filteredCards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filteredCards[i], filteredCards[j]] = [filteredCards[j], filteredCards[i]];
  }
  currentIndex = 0;
  isFlipped = false;
  card.classList.remove('flipped');
  renderCard();
}

// Event listeners
card.addEventListener('click', flip);
document.getElementById('flipBtn').addEventListener('click', (e) => { e.stopPropagation(); flip(); });
document.getElementById('nextBtn').addEventListener('click', (e) => { e.stopPropagation(); next(); });
document.getElementById('prevBtn').addEventListener('click', (e) => { e.stopPropagation(); prev(); });
document.getElementById('shuffleBtn').addEventListener('click', shuffle);

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') next();
  else if (e.key === 'ArrowLeft') prev();
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
});

// Swipe gestures
let touchStartX = 0;
let touchStartY = 0;
card.addEventListener('touchstart', (e) => {
  touchStartX = e.changedTouches[0].screenX;
  touchStartY = e.changedTouches[0].screenY;
}, { passive: true });
card.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].screenX - touchStartX;
  const dy = e.changedTouches[0].screenY - touchStartY;
  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)) {
    if (dx < 0) next();
    else prev();
  }
}, { passive: true });

// Initialize
renderCategories();
renderCard();
</script>
